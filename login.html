<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign in — Advanced Auth</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --glass: rgba(255,255,255,0.06);
      --glass-2: rgba(255,255,255,0.04);
      --accent: #00c7ff;
    }
    html,body { height:100%; }
    body{
      margin:0;
      font-family: Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
      color: #eaf6ff;
      background:
        linear-gradient(120deg, rgba(6,10,26,0.85), rgba(2,8,23,0.9)),
        radial-gradient(circle at 10% 10%, rgba(108,124,240,0.06), transparent 12%),
        radial-gradient(circle at 85% 80%, rgba(0,199,255,0.06), transparent 12%);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2rem;
    }

    .card-outer {
      width:100%;
      max-width:480px;
      border-radius:12px;
      backdrop-filter: blur(8px) saturate(160%);
      box-shadow: 0 18px 50px rgba(2,6,23,0.66);
      padding:18px;
      border:1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    }

    .brand {
      display:flex; gap:12px; align-items:center; margin-bottom:10px;
    }
    .logo {
      width:48px; height:48px; border-radius:10px;
      background: linear-gradient(135deg,#6C7CF0, #00C7FF);
      display:flex; align-items:center; justify-content:center; color:white; font-weight:700;
      box-shadow: 0 6px 18px rgba(108,124,240,0.2);
    }

    h2 { margin:0 0 .25rem 0; font-weight:700; color:#e6f4ff; }
    p.lead { margin:0 0 16px; color:#bfeaff; font-size:.95rem; }

    form .form-control {
      border-radius:10px;
      background: rgba(255,255,255,0.02);
      color: #e7f6ff;
      border: 1px solid rgba(255,255,255,0.06);
      padding: .9rem 1rem;
    }

    label { color:#9fcff0; font-weight:600; font-size:.9rem; }
    .form-text { color:#93c5fd; }

    .btn-primary {
      background: linear-gradient(90deg,#6C7CF0,#00C7FF);
      border: none;
      box-shadow: 0 8px 28px rgba(0,199,255,0.08);
      padding: .85rem 1rem;
      font-weight:600;
      border-radius:10px;
    }
    .btn-primary:hover { transform: translateY(-2px); }

    .muted-link { color:#9fcff0; text-decoration:none; }
    .flash { background: rgba(255, 99, 99, 0.09); color:#ffdede; padding:.6rem .9rem; border-radius:8px; margin-bottom:12px; }

    .footer-note { margin-top:14px; color:#98d2ff; font-size:.9rem; text-align:center; }
  </style>
</head>
<body>
  <div class="card-outer">
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <div style="font-weight:700; color:#e6f4ff">AdvancedAuth</div>
        <small style="color:#98d2ff">Secure sign in</small>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="lead">Sign in to access the secure dashboard.</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="post" class="mt-3">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" name="username" type="text" class="form-control" placeholder="your.username" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required>
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <small class="form-text">New here? <a class="muted-link" href="{{ url_for('register') }}">Create an account</a></small>
        <small class="form-text"><a class="muted-link" href="{{ url_for('index') }}">Home</a></small>
      </div>
    </form>

    <div class="footer-note">For learning purposes — production requires HTTPS & CSRF protection.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
