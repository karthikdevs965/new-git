<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Create account — Advanced Auth</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{ --accent1:#6C7CF0; --accent2:#00C7FF; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: Inter,system-ui,-apple-system,"Segoe UI",Roboto,Arial;
      background:
        linear-gradient(180deg, rgba(2,6,23,0.9), rgba(4,8,28,0.95)),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0 2px, transparent 2px 10px);
      display:flex; align-items:center; justify-content:center; padding:2rem;
      color:#e6f4ff;
    }

    .wrap {
      width:100%; max-width:520px;
      border-radius:14px; padding:22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border:1px solid rgba(255,255,255,0.06);
      box-shadow: 0 18px 50px rgba(2,6,23,0.72);
      backdrop-filter: blur(10px) saturate(160%);
    }

    .logo {
      width:56px;height:56px;border-radius:12px;
      background: linear-gradient(135deg,var(--accent1),var(--accent2));
      display:inline-flex; align-items:center; justify-content:center; color:white; font-weight:700;
      box-shadow: 0 8px 30px rgba(0,199,255,0.08);
    }

    .title { font-weight:700; margin:0 0 .2rem 0; color:#eaf6ff; font-size:1.25rem; }
    .subtitle { color:#9fd6ff; margin-bottom:12px; }

    .form-label { color:#9fd6ff; font-weight:600; }
    .form-control {
      border-radius:10px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      color:#e9fbff;
      padding:.85rem 1rem;
    }

    .btn-primary {
      background: linear-gradient(90deg,var(--accent1),var(--accent2));
      border:none; border-radius:10px; padding:.85rem;
      font-weight:700;
    }

    .muted-link { color:#bfe9ff; text-decoration:none; font-weight:600; }
    .flash { background: rgba(255, 99, 99, 0.09); color:#ffdede; padding:.6rem .9rem; border-radius:8px; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="d-flex align-items-center gap-3 mb-2">
      <div class="logo">A</div>
      <div>
        <div class="title">Create your account</div>
        <div class="subtitle">Starts in seconds. Secure password hashing included.</div>
      </div>
    </div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">{{ messages[0] }}</div>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('register') }}" method="post" class="mt-2">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input id="username" name="username" required type="text" class="form-control" placeholder="your.username">
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" required type="password" class="form-control" placeholder="Strong password">
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-primary">Create account</button>
      </div>

      <div class="mt-3 d-flex justify-content-between">
        <small class="form-text">Already have an account? <a class="muted-link" href="{{ url_for('login') }}">Sign in</a></small>
        <small class="form-text"><a class="muted-link" href="{{ url_for('index') }}">Back</a></small>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
